<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - EuroTaxi Mobile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }
        .icon-wrapper {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            margin-bottom: 24px;
        }
        .logo-text {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .retry-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 24px;
            background-color: #2563eb;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, opacity 0.2s;
        }
        .retry-button:active {
            background-color: #1d4ed8;
            transform: scale(0.98);
        }
        .retry-button:disabled {
            background-color: #1e40af;
            cursor: not-allowed;
            opacity: 0.8;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-toast {
            margin-top: 16px;
            font-size: 13px;
            color: #f87171;
            background-color: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.2);
            padding: 12px 16px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 1l22 22"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"/>
                <path d="M5 12.5a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <path d="M12 20h.01"/>
            </svg>
        </div>
        <div class="logo-text">EuroTaxi Mobile</div>
        <h1>Connection Lost</h1>
        <p>
            The system is unreachable. Please verify your internet connection (Wi-Fi or Mobile Data) on your device before proceeding.
        </p>
        
        <button id="retry-btn" onclick="handleRetry()" class="retry-button">
            <span id="btn-text">Try to Reconnect</span>
            <span id="btn-spinner" class="spinner" style="display: none;"></span>
        </button>

        <div id="error-message" class="error-toast" style="display: none;">
            Still offline. Please check your signal and try again.
        </div>
    </div>

    <script>
        async function handleRetry() {
            const btn = document.getElementById('retry-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const errorMsg = document.getElementById('error-message');

            // 1. Enter Loading State
            btn.disabled = true;
            btnText.innerText = 'Connecting...';
            btnSpinner.style.display = 'block';
            errorMsg.style.display = 'none';

            // 2. Perform a dynamic HEAD ping check with a 2.5s watchdog timeout
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2500);

            try {
                // Fetch a micro favicon file with a cache buster to verify true connection
                await fetch('https://eurotaxisystem.site/favicon_euro_transparent.png?t=' + Date.now(), {
                    method: 'GET',
                    mode: 'no-cors',
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                // If connection succeeds, load the live main page
                window.location.href = 'https://eurotaxisystem.site/';
            } catch (err) {
                clearTimeout(timeoutId);
                // 3. Connection failed (Still offline): restore button smoothly after a short delay
                setTimeout(() => {
                    btn.disabled = false;
                    btnText.innerText = 'Try to Reconnect';
                    btnSpinner.style.display = 'none';
                    errorMsg.style.display = 'block';
                }, 800);
            }
        }
    </script>
</body>
</html>
